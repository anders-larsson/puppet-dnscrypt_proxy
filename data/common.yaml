---
dnscrypt_proxy::package_name: dnscrypt-proxy
dnscrypt_proxy::service_name: dnscrypt-proxy
dnscrypt_proxy::config_path: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
dnscrypt_proxy::listen_addresses:
  - 127.0.0.1:53
dnscrypt_proxy::max_clients: 250
dnscrypt_proxy::ipv4_servers: true
dnscrypt_proxy::ipv6_servers: false
dnscrypt_proxy::dnscrypt_servers: true
dnscrypt_proxy::doh_servers: true
dnscrypt_proxy::odoh_servers: false
dnscrypt_proxy::require_dnssec: false
dnscrypt_proxy::require_nolog: true
dnscrypt_proxy::require_nofilter: true
dnscrypt_proxy::force_tcp: false
dnscrypt_proxy::http3: false
dnscrypt_proxy::http3_probe: false
dnscrypt_proxy::timeout: 5000
dnscrypt_proxy::keepalive: 30
